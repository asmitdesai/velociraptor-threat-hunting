name: Custom.Windows.Execution.SuspiciousPowerShell
description: Detects PowerShell processes running with suspicious flags often used by malware/scripts.
sources:
  - precondition:
      SELECT OS From info() where OS = 'windows'
  query: |
    SELECT Pid, Ppid, Name, CommandLine, Exe,
           timestamp(epoch=CreationTimestamp/1000) AS Created
    FROM proc_dump()
    WHERE Name =~ '(?i)powershell.exe'
      AND CommandLine =~ '(?i)-enc|-encoded|hidden|bypass|nop'
